name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: macos-latest
    # 防止 fork 仓库触发
    if: github.repository_owner == 'liruifengv'

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install Dependencies
        run: bun install

      - name: Create Release Pull Request or Publish to GitHub
        id: changesets
        uses: changesets/action@v1
        with:
          # 创建 Version PR（更新版本号和 CHANGELOG）
          version: bun run version
          # 发布到 GitHub Releases
          publish: bun run release
          # PR 标题
          title: "[CI]: Release Packages"
          # PR 提交信息
          commit: "[CI]: Release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 如果有版本发布，使用 Changeset 生成的 CHANGELOG 更新 Release Notes
      - name: Update Release Notes from Changelog
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 获取当前版本号
          VERSION=$(node -p "require('./package.json').version")
          echo "Current version: v$VERSION"

          # 从 CHANGELOG.md 提取当前版本的内容到临时文件
          # Changeset 生成的格式: ## x.x.x 开头，到下一个 ## 或文件结束
          awk -v ver="$VERSION" '
            BEGIN { found=0 }
            /^## / {
              if (found) exit
              if ($2 == ver) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md

          # 如果提取到内容，更新 Release
          if [ -s /tmp/release-notes.md ]; then
            echo "Updating release v$VERSION with changelog content:"
            cat /tmp/release-notes.md
            gh release edit "v$VERSION" --notes-file /tmp/release-notes.md
          else
            echo "No changelog content found for version $VERSION"
          fi
